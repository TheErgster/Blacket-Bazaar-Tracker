name: Fetch Bazaar Prices

on:
  schedule:
    - cron: '*/30 * * * *'

  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: scripts

      - name: Run fetch script
        run: bun run fetch.ts
        working-directory: scripts
        env:

          COOKIES: ${{ secrets.BLACKET_COOKIE }}

      - name: Commit updated price data
        run: |
          git config user.name "blacket-tracker-bot"
          git config user.email "bot@blacket-tracker"
          git add data/history.json
          # Only commit if the file actually changed (--quiet exits 0 if no diff)
          git diff --staged --quiet || git commit -m "chore: bazaar snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
